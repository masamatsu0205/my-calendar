<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>カレンダー</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>

        /* ============================================================
           オーバーレイ
        ============================================================ */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
        }

        /* ============================================================
           モーダル共通スタイル
        ============================================================ */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #3b0b0b;
            border: 2px solid #00D9FF;
            border-radius: 12px;
            padding: 20px;
            z-index: 1000;
        }

        /* ============================================================
           ページタイトル
        ============================================================ */
        h1 { text-align: center; color: #00D9FF; }

        /* ============================================================
           カレンダーヘッダー
        ============================================================ */
        #calendarHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 80%;
            margin: 10px auto;
        }
        #calendarTitle {
            font-size: 36px;
            font-weight: 900;
            color: #00D9FF;
            letter-spacing: 2px;
        }
        #monthNav { text-align: center; }

        /* ============================================================
           カレンダーテーブル本体
        ============================================================ */
        #calendar {
            width: 70%;
            margin: 4px auto;
            border: 2px solid #3b0b0b;
            border-spacing: 0;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }
        #calendar tr:first-child td {
            font-size: 18px;
            font-weight: 700;
            color: #00D9FF;
            background: #7b7256;
            text-align: center;
            vertical-align: middle;
            padding: 10px 0;
        }
        #calendar td {
            padding: 2px;
            text-align: left;
            height: 80px;
            width: 14%;
            vertical-align: top;
            border: 2px solid #3b0b0b;
            font-weight: 500;
            position: relative;
        }
        .date-number { display: inline-block; padding-left: 4px; }
        .date-events {
            display: flex;
            flex-direction: column;
            gap: 1px;
            padding: 0 2px;
            margin-top: 2px;
            margin-right: 18px;
        }
        .date-event-label {
            color: white;
            font-size: 10px;
            padding: 1px 3px;
            border-radius: 3px;
            display: block;
            overflow: hidden;
            white-space: nowrap;
            max-width: 100%;
        }
        .meal-dots {
            position: absolute;
            top: 4px; right: 4px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .meal-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        /* ============================================================
           予定一覧ビュー
        ============================================================ */
        #listView {
            display: none;
            width: 80%;
            margin: 10px auto;
            color: #00D9FF;
        }

        /* 年ブロック */
        .list-year {
            font-size: 24px;
            font-weight: 900;
            color: #00D9FF;
            margin-top: 20px;
            margin-bottom: 8px;
            border-bottom: 2px solid #7b7256;
            padding-bottom: 4px;
        }

        /* 月ブロック */
        .list-month {
            font-size: 18px;
            font-weight: 700;
            color: #00D9FF;
            margin-top: 12px;
            margin-bottom: 4px;
            padding-left: 16px;
        }

        /* 予定1件分の行 */
        .list-event-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px 6px 32px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .list-event-row:hover { background: rgba(255,255,255,0.08); }

        /* 日付部分 */
        .list-date {
            font-size: 14px;
            color: #aaa;
            width: 40px;
            flex-shrink: 0;
        }

        /* 時刻部分 */
        .list-time {
            font-size: 13px;
            color: #888;
            width: 110px;
            flex-shrink: 0;
        }

        /* 予定内容 */
        .list-text {
            font-size: 14px;
            color: white;
            flex: 1;
        }

        /* 予定の色インジケーター（左端の細い縦線） */
        .list-color-bar {
            width: 4px;
            height: 36px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* 予定なし表示 */
        .list-empty {
            text-align: center;
            color: #666;
            padding: 40px;
            font-size: 16px;
        }

        /* ============================================================
           タイムラインモーダル
        ============================================================ */
        #viewModal { width: 650px; height: 90vh; overflow-y: auto; }
        #viewModalTitle { color: #00D9FF; }
        .timeline-row {
            display: flex;
            align-items: flex-start;
            border-top: 1px solid #7b7256;
            min-height: 5px;
            padding: 1px 0;
        }
        .timeline-time {
            width: 40px; font-size: 12px;
            color: #00D9FF; flex-shrink: 0; padding-top: 2px;
        }
        .timeline-left {
            flex: 1; display: flex; flex-direction: column;
            gap: 1px; padding-right: 4px; align-items: flex-end;
        }
        .timeline-center {
            width: 1px; background: #7b7256;
            align-self: stretch; flex-shrink: 0;
        }
        .timeline-right {
            flex: 1; display: flex; flex-direction: column;
            gap: 1px; padding-left: 4px; align-items: flex-start;
        }
        .timeline-event {
            border-radius: 4px; padding: 2px 6px;
            font-size: 12px; display: flex;
            align-items: center; gap: 4px;
            cursor: pointer; max-width: 100%;
        }
        .timeline-event button {
            background: none; border: none;
            color: red; cursor: pointer;
            font-size: 13px; padding: 0; flex-shrink: 0;
        }
        .timeline-bar {
            opacity: 0.4; height: 100%;
            min-height: 20px; width: 8px; border-radius: 2px;
        }

        /* ============================================================
           予定追加・編集モーダル
        ============================================================ */
        #modal h3    { color: #00D9FF; display: inline; }
        #modal label { color: #00D9FF; }
        .modal-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        #duplicateBtn {
            font-size: 13px;
            padding: 4px 10px;
            background: #7b7256;
            color: #00D9FF;
            border: 2px solid #00D9FF;
            border-radius: 6px;
            cursor: pointer;
        }
        #duplicateBtn:hover { background: #ada07a; }
        #datePickerBtn {
            font-size: 16px;
            padding: 6px 12px;
            background: #7b7256;
            color: #00D9FF;
            border: 2px solid #00D9FF;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 8px;
        }
        #datePickerBtn:hover { background: #ada07a; }

        /* ============================================================
           ミニカレンダー
        ============================================================ */
        #miniCal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #3b0b0b;
            border: 2px solid #00D9FF;
            border-radius: 10px;
            padding: 12px;
            z-index: 1100;
            width: 260px;
        }
        #miniCalHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #00D9FF;
            margin-bottom: 8px;
        }
        #miniCalHeader button {
            font-size: 14px;
            padding: 2px 8px;
            background: #7b7256;
            border: none;
        }
        #miniCalTitle { font-size: 15px; font-weight: bold; color: #00D9FF; }
        #miniCalTable { width: 100%; border-collapse: collapse; }
        #miniCalTable th {
            color: #00D9FF; font-size: 12px;
            text-align: center; padding: 2px;
        }
        #miniCalTable td {
            text-align: center; padding: 4px 2px;
            font-size: 13px; cursor: pointer;
            border-radius: 4px; color: white;
            height: auto !important; width: auto !important;
            border: none !important; vertical-align: middle !important;
            font-weight: normal !important; position: static !important;
            background: none !important;
        }
        #miniCalTable td:hover { background: #7b7256 !important; }
        #miniCalTable td.mini-today { color: #2ecc71 !important; font-weight: bold !important; }
        #miniCalTable td.mini-sun   { color: #e74c3c !important; }
        #miniCalTable td.mini-sat   { color: #3498db !important; }
        #miniCalTable td.mini-other { color: #666 !important; cursor: default; }
        #miniCalTable td.mini-other:hover { background: none !important; }

        /* ============================================================
           ご飯モーダル
        ============================================================ */
        #mealModal h3    { color: #00D9FF; }
        #mealModal label { color: #00D9FF; }
        #mealModal table { border-collapse: collapse; margin-top: 10px; }
        #mealModal td {
            padding: 6px 8px; color: #00D9FF;
            font-size: 14px; border: none;
            height: auto !important; width: auto !important;
            background: none !important;
        }
        .meal-select-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer; padding: 0; font-size: 0;
        }
        .meal-select-btn.selected { border: 2px solid white; }

        /* ============================================================
           色選択ボタン
        ============================================================ */
        .colorOption {
            display: inline-block;
            width: 30px; height: 30px;
            line-height: 30px; text-align: center;
            border-radius: 4px; cursor: pointer;
            font-size: 10px; color: white;
            margin: 2px; border: 2px solid transparent;
            vertical-align: middle;
        }
        .colorOption.selected { border: 2px solid black; }

        /* ============================================================
           フォントと背景
        ============================================================ */
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-weight: 400;
            background-image: url("97744961.jpg");
            background-position: 10% 30%;
            background-size: 110%;
            background-repeat: no-repeat;
        }
        button, input, select, textarea { font-family: inherit !important; }

        /* ============================================================
           ボタン共通スタイル
        ============================================================ */
        button {
            padding: 8px 14px; font-size: 20px;
            border-radius: 8px; border: 3px solid #3b0b0b;
            background: #7b7256; color: #00D9FF; transition: 0.2s;
        }
        button:hover { background: #ada07a; transform: translateY(-1px); }

    </style>
</head>

<body>

    <h1 id="title">カレンダー</h1>

    <div id="overlay" class="overlay" onclick="closeAllModals()"></div>

    <!-- ============================================================
         予定追加・編集モーダル
    ============================================================ -->
    <div id="modal" class="modal">
        <div class="modal-title-row">
            <h3 id="modalTitle">予定追加</h3>
            <button id="duplicateBtn" style="display:none;" onclick="duplicateEvent()">複製</button>
        </div>
        <label>日付:
            <button type="button" id="datePickerBtn" onclick="openMiniCal()">日付を選ぶ</button>
        </label><br><br>
        <input type="hidden" id="inputYear">
        <input type="hidden" id="inputMonth">
        <input type="hidden" id="inputDate">
        <label>開始: <input type="time" id="inputStartTime"></label><br><br>
        <label>終了: <input type="time" id="inputEndTime"></label><br><br>
        <label>予定: <input type="text" id="inputEvent"></label><br><br>
        <label>色:
            <button type="button" id="colorToggleBtn" onclick="toggleColorPicker()">🎨 色を選ぶ</button>
        </label>
        <div id="colorPicker" style="display:none;">
            <span class="colorOption" data-color="#3498db" style="background:#3498db;">青</span>
            <span class="colorOption" data-color="#2ecc71" style="background:#2ecc71;">緑</span>
            <span class="colorOption" data-color="#e74c3c" style="background:#e74c3c;">赤</span>
            <span class="colorOption" data-color="#e67e22" style="background:#e67e22;">オレン</span>
            <span class="colorOption" data-color="#795548" style="background:#795548;">茶</span>
        </div>
        <input type="hidden" id="inputColor" value="#3498db">
        <br><br>
        <button onclick="saveEvent()">追加</button>
        <button onclick="closeModal()">キャンセル</button>
    </div>

    <!-- ============================================================
         ミニカレンダー
    ============================================================ -->
    <div id="miniCal">
        <div id="miniCalHeader">
            <button onclick="miniCalPrev()">＜</button>
            <span id="miniCalTitle"></span>
            <button onclick="miniCalNext()">＞</button>
        </div>
        <table id="miniCalTable">
            <thead>
                <tr>
                    <th>日</th><th>月</th><th>火</th><th>水</th>
                    <th>木</th><th>金</th><th>土</th>
                </tr>
            </thead>
            <tbody id="miniCalBody"></tbody>
        </table>
    </div>

    <!-- ============================================================
         ご飯モーダル
    ============================================================ -->
    <div id="mealModal" class="modal">
        <h3>ご飯設定</h3>
        <label>曜日を選んで朝昼晩の色を設定してください</label><br>
        <small style="color:#aaa;">緑が必要　赤が不要　黄色が弁当or夜食　灰色未定</small>
        <br><br>
        <div style="color:#00D9FF; margin-bottom:10px;">
            <label><input type="checkbox" class="dayCheck" value="0"> 日</label>　
            <label><input type="checkbox" class="dayCheck" value="1"> 月</label>　
            <label><input type="checkbox" class="dayCheck" value="2"> 火</label>　
            <label><input type="checkbox" class="dayCheck" value="3"> 水</label>　
            <label><input type="checkbox" class="dayCheck" value="4"> 木</label>　
            <label><input type="checkbox" class="dayCheck" value="5"> 金</label>　
            <label><input type="checkbox" class="dayCheck" value="6"> 土</label>
        </div>
        <table>
            <tr><td>朝</td><td>
                <button class="meal-select-btn" data-meal="morning" data-state="unknown"   style="background:#aaaaaa;" onclick="selectMealBtn(this)"></button>
                <button class="meal-select-btn" data-meal="morning" data-state="needed"    style="background:#2ecc71;" onclick="selectMealBtn(this)"></button>
                <button class="meal-select-btn" data-meal="morning" data-state="notNeeded" style="background:#e74c3c;" onclick="selectMealBtn(this)"></button>
                <button class="meal-select-btn" data-meal="morning" data-state="bento"     style="background:#f1c40f;" onclick="selectMealBtn(this)"></button>
            </td></tr>
            <tr><td>昼</td><td>
                <button class="meal-select-btn" data-meal="lunch" data-state="unknown"   style="background:#aaaaaa;" onclick="selectMealBtn(this)"></button>
                <button class="meal-select-btn" data-meal="lunch" data-state="needed"    style="background:#2ecc71;" onclick="selectMealBtn(this)"></button>
                <button class="meal-select-btn" data-meal="lunch" data-state="notNeeded" style="background:#e74c3c;" onclick="selectMealBtn(this)"></button>
                <button class="meal-select-btn" data-meal="lunch" data-state="bento"     style="background:#f1c40f;" onclick="selectMealBtn(this)"></button>
            </td></tr>
            <tr><td>晩</td><td>
                <button class="meal-select-btn" data-meal="dinner" data-state="unknown"   style="background:#aaaaaa;" onclick="selectMealBtn(this)"></button>
                <button class="meal-select-btn" data-meal="dinner" data-state="needed"    style="background:#2ecc71;" onclick="selectMealBtn(this)"></button>
                <button class="meal-select-btn" data-meal="dinner" data-state="notNeeded" style="background:#e74c3c;" onclick="selectMealBtn(this)"></button>
                <button class="meal-select-btn" data-meal="dinner" data-state="bento"     style="background:#f1c40f;" onclick="selectMealBtn(this)"></button>
            </td></tr>
        </table>
        <br>
        <button onclick="applyMealBulk()">この月に適用</button>
        <button onclick="closeMealModal()">閉じる</button>
    </div>

    <!-- ============================================================
         タイムラインモーダル
    ============================================================ -->
    <div id="viewModal" class="modal">
        <h3 id="viewModalTitle"></h3>
        <div id="timeline"></div>
        <br>
        <button onclick="closeViewModal()">閉じる</button>
    </div>

    <!-- ============================================================
         ヘッダー
    ============================================================ -->
    <div id="calendarHeader">
        <!-- 左：月ナビ（カレンダーモード）or 戻るボタン（一覧モード） -->
        <div id="monthNav">
            <button onclick="prevMonth()">＜＜</button>
            <button onclick="goToday()">今月へ</button>
            <button onclick="nextMonth()">＞＞</button>
        </div>
        <div id="backNav" style="display:none;">
            <button onclick="showCalendar()">戻る</button>
        </div>

        <div id="calendarTitle"></div>

        <!-- 右：ボタン群 -->
        <div>
            <button onclick="showList()">予定一覧</button>
            <button onclick="openModal()">予定追加</button>
            <button onclick="openMealModal()">ご飯</button>
        </div>
    </div>

    <!-- カレンダー本体 -->
    <table border="1" id="calendar"></table>

    <!-- 予定一覧ビュー -->
    <div id="listView"></div>


    <script>

        // ============================================================
        // Supabase接続設定
        // ============================================================
        const SUPABASE_URL = "https://jpmlzfapdjoqxgbbnpup.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwbWx6ZmFwZGpvcXhnYmJucHVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MjAyMDMsImV4cCI6MjA5MjI5NjIwM30.wAiIc5rs9R92vDwYFk6CgRdT7utliBHLAsxff63aEZ4";
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        // 左右判定
        // ============================================================
        const LEFT_COLORS = ["#3498db", "#2ecc71"];
        function getSide(color) {
            return LEFT_COLORS.includes(color) ? "left" : "right";
        }

        // ============================================================
        // 朝昼晩の色定義
        // ============================================================
        const MEAL_COLORS = {
            unknown:   "#aaaaaa",
            needed:    "#2ecc71",
            notNeeded: "#e74c3c",
            bento:     "#f1c40f"
        };
        const MEAL_CYCLE = ["unknown", "needed", "notNeeded", "bento"];
        let mealData           = {};
        let mealModalSelection = { morning: "unknown", lunch: "unknown", dinner: "unknown" };

        // ============================================================
        // 変数
        // ============================================================
        let events       = {};
        let currentYear  = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let editingKey   = "";
        let editingId    = -1;
        let holidays     = {};
        let viewMode     = "calendar"; // "calendar" or "list"

        const today      = new Date();
        const todayYear  = today.getFullYear();
        const todayMonth = today.getMonth();
        const todayDate  = today.getDate();
        const days       = ["日", "月", "火", "水", "木", "金", "土"];

        let miniCalYear  = new Date().getFullYear();
        let miniCalMonth = new Date().getMonth();

        // ============================================================
        // 初期化
        // ============================================================
        window.onload = async function () {
            await fetchHolidays();
            await loadEvents();
            await loadMeals();
        };

        // ============================================================
        // 祝日データ取得
        // ============================================================
        async function fetchHolidays() {
            const res  = await fetch("https://holidays-jp.github.io/api/v1/date.json");
            const data = await res.json();
            for (let dateStr in data) {
                let d   = new Date(dateStr);
                let key =
                    d.getFullYear() + "-" +
                    String(d.getMonth() + 1).padStart(2, "0") + "-" +
                    String(d.getDate()).padStart(2, "0");
                holidays[key] = data[dateStr];
            }
        }

        // ============================================================
        // 予定データ取得
        // ============================================================
        async function loadEvents() {
            const { data, error } = await sb
                .from("events")
                .select("*")
                .order("date",       { ascending: true })
                .order("start_time", { ascending: true });
            if (error) { console.error("予定取得エラー:", error); return; }
            events = {};
            data.forEach(ev => {
                let key = ev.date;
                if (!events[key]) { events[key] = []; }
                events[key].push({
                    id: ev.id, start_time: ev.start_time,
                    end_time: ev.end_time, text: ev.text, color: ev.color
                });
            });
        }

        // ============================================================
        // 食事データ取得
        // ============================================================
        async function loadMeals() {
            const { data, error } = await sb.from("meals").select("*");
            if (error) { console.error("食事取得エラー:", error); return; }
            data.forEach(row => {
                mealData[row.date] = {
                    morning: row.morning, lunch: row.lunch, dinner: row.dinner
                };
            });
            renderCalendar();
        }

        // ============================================================
        // 食事データ保存
        // ============================================================
        async function saveMeal(key) {
            const meal = mealData[key];
            const { error } = await sb.from("meals").upsert(
                { date: key, morning: meal.morning, lunch: meal.lunch, dinner: meal.dinner },
                { onConflict: "date" }
            );
            if (error) { console.error("食事保存エラー:", error); }
        }

        // ============================================================
        // 時刻整形
        // ============================================================
        function formatTime(timeStr) { return timeStr.slice(0, 5); }

        // ============================================================
        // カレンダー描画
        // ============================================================
        function renderCalendar() {
            updateUI();
            const calendar     = document.getElementById("calendar");
            calendar.innerHTML = "";
            const firstDay     = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate     = new Date(currentYear, currentMonth + 1, 0).getDate();
            const prevLastDate = new Date(currentYear, currentMonth, 0).getDate();

            document.getElementById("title").textContent =
                currentYear + "年" + (currentMonth + 1) + "月";

            let html = "<tr>";
            for (let d of days) { html += "<td>" + d + "</td>"; }
            html += "</tr><tr>";

            for (let i = 0; i < firstDay; i++) {
                html += "<td style='color:lightgray'>" + (prevLastDate - firstDay + i + 1) + "</td>";
            }

            let count = firstDay;
            for (let d = 1; d <= lastDate; d++) {
                let dayOfWeek = (d + firstDay - 1) % 7;
                let key =
                    currentYear + "-" +
                    String(currentMonth + 1).padStart(2, "0") + "-" +
                    String(d).padStart(2, "0");

                let color = "", todayStyle = "";
                if      (dayOfWeek === 0) { color = "red";  }
                else if (dayOfWeek === 6) { color = "blue"; }
                if (holidays[key])        { color = "red";  }

                let isToday = (currentYear === todayYear && currentMonth === todayMonth && d === todayDate);
                if (isToday) { color = "green"; todayStyle = "font-size:20px; font-weight:bold;"; }

                let dotsHtml = "";
                if (events[key]) {
                    for (let ev of events[key]) {
                        dotsHtml += "<span class='date-event-label' style='background:" + ev.color + ";'>" +
                            ev.text.slice(0, 4) + "</span>";
                    }
                }

                if (!mealData[key]) {
                    mealData[key] = { morning: "unknown", lunch: "unknown", dinner: "unknown" };
                }
                let meal = mealData[key];
                let mealHtml =
                    "<div class='meal-dots'>" +
                    "<div class='meal-dot' style='background:" + MEAL_COLORS[meal.morning] + ";' onclick='cycleMeal(event,\"" + key + "\",\"morning\")' title='朝'></div>" +
                    "<div class='meal-dot' style='background:" + MEAL_COLORS[meal.lunch]   + ";' onclick='cycleMeal(event,\"" + key + "\",\"lunch\")'   title='昼'></div>" +
                    "<div class='meal-dot' style='background:" + MEAL_COLORS[meal.dinner]  + ";' onclick='cycleMeal(event,\"" + key + "\",\"dinner\")' title='晩'></div>" +
                    "</div>";

                html += "<td style='color:" + color + "; " + todayStyle + "' onclick='openTimeline(\"" + key + "\")'>" +
                    "<span class='date-number'>" + d + "</span>" +
                    "<div class='date-events'>" + dotsHtml + "</div>" +
                    mealHtml + "</td>";

                count++;
                if (count % 7 === 0) { html += "</tr><tr>"; }
            }

            let nextDate = 1;
            while (count % 7 !== 0) {
                html += "<td style='color:lightgray'>" + nextDate + "</td>";
                nextDate++; count++;
            }
            html += "</tr>";
            calendar.innerHTML = html;
        }

        // ============================================================
        // 予定一覧ビューの描画
        // 年→月→日の順にグループ化して表示
        // ============================================================
        function renderListView() {
            const listView = document.getElementById("listView");

            // eventsを日付順にフラットなリストに変換
            let allEvents = [];
            for (let key in events) {
                for (let ev of events[key]) {
                    allEvents.push({ key, ev });
                }
            }

            // 日付・開始時刻順にソート
            allEvents.sort((a, b) => {
                if (a.key !== b.key) return a.key.localeCompare(b.key);
                return a.ev.start_time.localeCompare(b.ev.start_time);
            });

            if (allEvents.length === 0) {
                listView.innerHTML = "<div class='list-empty'>予定がありません</div>";
                return;
            }

            let html      = "";
            let lastYear  = "";
            let lastMonth = "";

            for (let { key, ev } of allEvents) {
                const parts = key.split("-");
                const year  = parts[0];
                const month = Number(parts[1]);
                const day   = Number(parts[2]);

                // 年が変わったら年ヘッダーを出す
                if (year !== lastYear) {
                    html     += "<div class='list-year'>" + year + "年</div>";
                    lastYear  = year;
                    lastMonth = ""; // 年が変わったら月もリセット
                }

                // 月が変わったら月ヘッダーを出す
                let monthKey = year + "-" + month;
                if (monthKey !== lastMonth) {
                    html     += "<div class='list-month'>" + month + "月</div>";
                    lastMonth = monthKey;
                }

                // 予定行（クリックで編集モーダルを開く）
                // eventsオブジェクトのidxを特定する
                let idx = events[key].findIndex(e => e.id === ev.id);

                html +=
                    "<div class='list-event-row' onclick='editEventFromList(\"" + key + "\"," + idx + ")'>" +
                    "<div class='list-color-bar' style='background:" + ev.color + ";'></div>" +
                    "<div class='list-date'>" + day + "日</div>" +
                    "<div class='list-time'>" + formatTime(ev.start_time) + " - " + formatTime(ev.end_time) + "</div>" +
                    "<div class='list-text'>" + ev.text + "</div>" +
                    "</div>";
            }

            listView.innerHTML = html;
        }

        // ============================================================
        // 予定一覧から編集モーダルを開く
        // ============================================================
        function editEventFromList(key, idx) {
            editEvent(key, idx);
        }

        // ============================================================
        // カレンダーモードに切り替え
        // ============================================================
        function showCalendar() {
            viewMode = "calendar";
            document.getElementById("calendar").style.display  = "table";
            document.getElementById("listView").style.display  = "none";
            document.getElementById("monthNav").style.display  = "flex";
            document.getElementById("backNav").style.display   = "none";
            document.getElementById("title").textContent =
                currentYear + "年" + (currentMonth + 1) + "月";
        }

        // ============================================================
        // 一覧モードに切り替え
        // ============================================================
        function showList() {
            viewMode = "list";
            document.getElementById("calendar").style.display  = "none";
            document.getElementById("listView").style.display  = "block";
            document.getElementById("monthNav").style.display  = "none";
            document.getElementById("backNav").style.display   = "block";
            document.getElementById("title").textContent       = "予定一覧";
            renderListView();
        }

        // ============================================================
        // 朝昼晩の丸クリック
        // ============================================================
        async function cycleMeal(e, key, mealType) {
            e.stopPropagation();
            if (!mealData[key]) {
                mealData[key] = { morning: "unknown", lunch: "unknown", dinner: "unknown" };
            }
            let idx = MEAL_CYCLE.indexOf(mealData[key][mealType]);
            mealData[key][mealType] = MEAL_CYCLE[(idx + 1) % MEAL_CYCLE.length];
            await saveMeal(key);
            renderCalendar();
        }

        // ============================================================
        // ミニカレンダー
        // ============================================================
        function openMiniCal() {
            let y = parseInt(document.getElementById("inputYear").value);
            let m = parseInt(document.getElementById("inputMonth").value);
            if (y) { miniCalYear  = y; }
            if (m) { miniCalMonth = m - 1; }
            renderMiniCal();
            document.getElementById("miniCal").style.display = "block";
        }
        function closeMiniCal() {
            document.getElementById("miniCal").style.display = "none";
        }
        function miniCalPrev() { miniCalMonth--; if (miniCalMonth < 0) { miniCalMonth = 11; miniCalYear--; } renderMiniCal(); }
        function miniCalNext() { miniCalMonth++; if (miniCalMonth > 11) { miniCalMonth = 0; miniCalYear++; } renderMiniCal(); }

        function renderMiniCal() {
            document.getElementById("miniCalTitle").textContent =
                miniCalYear + "年" + (miniCalMonth + 1) + "月";
            const firstDay = new Date(miniCalYear, miniCalMonth, 1).getDay();
            const lastDate = new Date(miniCalYear, miniCalMonth + 1, 0).getDate();
            const prevLast = new Date(miniCalYear, miniCalMonth, 0).getDate();
            let html = "", count = 0;
            html += "<tr>";
            for (let i = 0; i < firstDay; i++) {
                html += "<td class='mini-other'>" + (prevLast - firstDay + i + 1) + "</td>";
                count++;
            }
            for (let d = 1; d <= lastDate; d++) {
                let dow = (d + firstDay - 1) % 7;
                let cls = "";
                if (miniCalYear === todayYear && miniCalMonth === todayMonth && d === todayDate) {
                    cls = "mini-today";
                } else if (dow === 0) { cls = "mini-sun";
                } else if (dow === 6) { cls = "mini-sat"; }
                html += "<td class='" + cls + "' onclick='selectMiniCalDate(" + miniCalYear + "," + (miniCalMonth + 1) + "," + d + ")'>" + d + "</td>";
                count++;
                if (count % 7 === 0 && d < lastDate) { html += "</tr><tr>"; }
            }
            let next = 1;
            while (count % 7 !== 0) {
                html += "<td class='mini-other'>" + next + "</td>";
                next++; count++;
            }
            html += "</tr>";
            document.getElementById("miniCalBody").innerHTML = html;
        }

        function selectMiniCalDate(y, m, d) {
            document.getElementById("inputYear").value  = y;
            document.getElementById("inputMonth").value = m;
            document.getElementById("inputDate").value  = d;
            document.getElementById("datePickerBtn").textContent =
                y + "年" + m + "月" + d + "日";
            closeMiniCal();
        }

        // ============================================================
        // タイムライン表示
        // ============================================================
        function openTimeline(key) {
            let titleText = key;
            if (holidays[key]) { titleText += " 🎌 " + holidays[key]; }
            document.getElementById("viewModalTitle").textContent = titleText;

            let html = "";
            for (let h = 0; h < 24; h++) {
                html += "<div class='timeline-row'>";
                html += "<div class='timeline-time'>" + h + ":00</div>";

                html += "<div class='timeline-left'>";
                if (events[key]) {
                    for (let idx = 0; idx < events[key].length; idx++) {
                        let ev = events[key][idx];
                        let startHour = parseInt(ev.start_time.split(":")[0]);
                        let endHour   = parseInt(ev.end_time.split(":")[0]);
                        let endMin    = parseInt(ev.end_time.split(":")[1]);
                        if (getSide(ev.color) !== "left") continue;
                        if (startHour === h) {
                            html += "<div class='timeline-event' style='background:" + ev.color + "; color:white;' onclick='editEvent(\"" + key + "\"," + idx + ")'>" +
                                "<div><div style='font-size:10px;'>" + formatTime(ev.start_time) + "-" + formatTime(ev.end_time) + "</div>" +
                                "<div>" + ev.text + "</div></div>" +
                                "<button onclick='event.stopPropagation(); deleteEvent(\"" + key + "\"," + idx + ")'>×</button></div>";
                        }
                        if (h > startHour && (h < endHour || (h === endHour && endMin > 0))) {
                            html += "<div class='timeline-bar' style='background:" + ev.color + ";'></div>";
                        }
                    }
                }
                html += "</div>";
                html += "<div class='timeline-center'></div>";
                html += "<div class='timeline-right'>";
                if (events[key]) {
                    for (let idx = 0; idx < events[key].length; idx++) {
                        let ev = events[key][idx];
                        let startHour = parseInt(ev.start_time.split(":")[0]);
                        let endHour   = parseInt(ev.end_time.split(":")[0]);
                        let endMin    = parseInt(ev.end_time.split(":")[1]);
                        if (getSide(ev.color) !== "right") continue;
                        if (startHour === h) {
                            html += "<div class='timeline-event' style='background:" + ev.color + "; color:white;' onclick='editEvent(\"" + key + "\"," + idx + ")'>" +
                                "<div><div style='font-size:10px;'>" + formatTime(ev.start_time) + "-" + formatTime(ev.end_time) + "</div>" +
                                "<div>" + ev.text + "</div></div>" +
                                "<button onclick='event.stopPropagation(); deleteEvent(\"" + key + "\"," + idx + ")'>×</button></div>";
                        }
                        if (h > startHour && (h < endHour || (h === endHour && endMin > 0))) {
                            html += "<div class='timeline-bar' style='background:" + ev.color + ";'></div>";
                        }
                    }
                }
                html += "</div>";
                html += "</div>";
            }

            document.getElementById("timeline").innerHTML = html;
            document.getElementById("viewModal").style.display = "block";
            document.getElementById("overlay").style.display  = "block";

            const rows = document.querySelectorAll(".timeline-row");
            if (rows[new Date().getHours()]) {
                rows[new Date().getHours()].scrollIntoView({ block: "center" });
            }
        }

        function closeViewModal() {
            document.getElementById("viewModal").style.display = "none";
            document.getElementById("overlay").style.display  = "none";
        }

        // ============================================================
        // 予定削除
        // ============================================================
        async function deleteEvent(key, idx) {
            const id = events[key][idx].id;
            const { error } = await sb.from("events").delete().eq("id", id);
            if (error) { console.error("削除エラー:", error); return; }
            await loadEvents();
            if (viewMode === "list") {
                renderListView();
            } else {
                openTimeline(key);
                renderCalendar();
            }
        }

        // ============================================================
        // 予定追加モーダルを開く
        // ============================================================
        function openModal() {
            const now = new Date();
            let y = now.getFullYear();
            let m = now.getMonth() + 1;
            let d = now.getDate();

            document.getElementById("inputYear").value  = y;
            document.getElementById("inputMonth").value = m;
            document.getElementById("inputDate").value  = d;
            document.getElementById("datePickerBtn").textContent = y + "年" + m + "月" + d + "日";

            document.getElementById("inputStartTime").value =
                String(now.getHours()).padStart(2, "0") + ":" +
                String(now.getMinutes()).padStart(2, "0");
            document.getElementById("inputEndTime").value   =
                String(now.getHours() + 1).padStart(2, "0") + ":" +
                String(now.getMinutes()).padStart(2, "0");
            document.getElementById("inputEvent").value = "";

            document.getElementById("colorPicker").style.display  = "none";
            document.getElementById("colorToggleBtn").textContent = "🎨 色を選ぶ";
            document.querySelectorAll(".colorOption").forEach(e => e.classList.remove("selected"));
            document.getElementById("inputColor").value = "#3498db";

            document.getElementById("modalTitle").textContent     = "予定追加";
            document.getElementById("duplicateBtn").style.display = "none";

            editingKey = "";
            editingId  = -1;

            document.getElementById("modal").style.display   = "block";
            document.getElementById("overlay").style.display = "block";
        }

        function closeModal() {
            closeMiniCal();
            document.getElementById("modal").style.display   = "none";
            document.getElementById("overlay").style.display = "none";
        }

        function closeAllModals() {
            closeModal();
            closeViewModal();
            closeMealModal();
        }

        // ============================================================
        // 予定保存
        // ============================================================
        async function saveEvent() {
            const year      = document.getElementById("inputYear").value;
            const month     = String(document.getElementById("inputMonth").value).padStart(2, "0");
            const date      = String(document.getElementById("inputDate").value).padStart(2, "0");
            const startTime = document.getElementById("inputStartTime").value;
            const endTime   = document.getElementById("inputEndTime").value;
            const text      = document.getElementById("inputEvent").value;
            const color     = document.getElementById("inputColor").value;

            if (!year || !month || !date || !startTime || !endTime || !text) {
                alert("全て入力してください");
                return;
            }
            if (startTime >= endTime) {
                alert("終了時刻は開始時刻より後にしてください");
                return;
            }

            const dateStr = year + "-" + month + "-" + date;

            if (editingId !== -1) {
                const { error } = await sb.from("events")
                    .update({ date: dateStr, start_time: startTime, end_time: endTime, text, color })
                    .eq("id", editingId);
                if (error) { console.error("更新エラー:", error); return; }
            } else {
                const { error } = await sb.from("events")
                    .insert({ date: dateStr, start_time: startTime, end_time: endTime, text, color });
                if (error) { console.error("保存エラー:", error); return; }
            }

            closeModal();
            await loadEvents();
            if (viewMode === "list") {
                renderListView(); // 一覧モードなら一覧を更新
            } else {
                renderCalendar();
            }
        }

        // ============================================================
        // 予定編集
        // ============================================================
        function editEvent(key, idx) {
            const ev    = events[key][idx];
            const parts = key.split("-");
            let y = Number(parts[0]);
            let m = Number(parts[1]);
            let d = Number(parts[2]);

            document.getElementById("inputYear").value  = y;
            document.getElementById("inputMonth").value = m;
            document.getElementById("inputDate").value  = d;
            document.getElementById("datePickerBtn").textContent = y + "年" + m + "月" + d + "日";

            document.getElementById("inputStartTime").value = formatTime(ev.start_time);
            document.getElementById("inputEndTime").value   = formatTime(ev.end_time);
            document.getElementById("inputEvent").value     = ev.text;
            document.getElementById("inputColor").value     = ev.color;

            document.getElementById("colorPicker").style.display = "none";
            const matchingOption = document.querySelector(".colorOption[data-color='" + ev.color + "']");
            if (matchingOption) {
                document.querySelectorAll(".colorOption").forEach(e => e.classList.remove("selected"));
                matchingOption.classList.add("selected");
                document.getElementById("colorToggleBtn").textContent = "🎨 " + matchingOption.textContent;
            }

            document.getElementById("modalTitle").textContent     = "予定編集";
            document.getElementById("duplicateBtn").style.display = "inline";

            editingKey = key;
            editingId  = ev.id;

            closeViewModal();
            document.getElementById("modal").style.display   = "block";
            document.getElementById("overlay").style.display = "block";
        }

        // ============================================================
        // 予定複製
        // ============================================================
        async function duplicateEvent() {
            const year      = document.getElementById("inputYear").value;
            const month     = String(document.getElementById("inputMonth").value).padStart(2, "0");
            const date      = String(document.getElementById("inputDate").value).padStart(2, "0");
            const startTime = document.getElementById("inputStartTime").value;
            const endTime   = document.getElementById("inputEndTime").value;
            const text      = document.getElementById("inputEvent").value;
            const color     = document.getElementById("inputColor").value;

            if (!year || !month || !date) {
                alert("複製先の日付を選んでください");
                return;
            }

            const dateStr = year + "-" + month + "-" + date;
            const { error } = await sb.from("events")
                .insert({ date: dateStr, start_time: startTime, end_time: endTime, text, color });
            if (error) { console.error("複製エラー:", error); return; }

            closeModal();
            await loadEvents();
            if (viewMode === "list") {
                renderListView();
            } else {
                renderCalendar();
            }
        }

        // ============================================================
        // 色ピッカー
        // ============================================================
        function toggleColorPicker() {
            const picker = document.getElementById("colorPicker");
            picker.style.display = picker.style.display === "none" ? "block" : "none";
        }

        document.querySelectorAll(".colorOption").forEach(el => {
            el.addEventListener("click", function () {
                document.querySelectorAll(".colorOption").forEach(e => e.classList.remove("selected"));
                this.classList.add("selected");
                document.getElementById("inputColor").value           = this.dataset.color;
                document.getElementById("colorToggleBtn").textContent = "🎨 " + this.textContent;
                document.getElementById("colorPicker").style.display  = "none";
            });
        });

        // ============================================================
        // ご飯モーダル
        // ============================================================
        function openMealModal() {
            mealModalSelection = { morning: "unknown", lunch: "unknown", dinner: "unknown" };
            document.querySelectorAll(".dayCheck").forEach(cb => cb.checked = false);
            document.querySelectorAll(".meal-select-btn").forEach(btn => btn.classList.remove("selected"));
            document.getElementById("mealModal").style.display = "block";
            document.getElementById("overlay").style.display   = "block";
        }
        function closeMealModal() {
            document.getElementById("mealModal").style.display = "none";
            document.getElementById("overlay").style.display   = "none";
        }
        function selectMealBtn(btn) {
            let meal  = btn.dataset.meal;
            let state = btn.dataset.state;
            document.querySelectorAll(".meal-select-btn[data-meal='" + meal + "']")
                .forEach(b => b.classList.remove("selected"));
            btn.classList.add("selected");
            mealModalSelection[meal] = state;
        }
        async function applyMealBulk() {
            let checkedDays = [];
            document.querySelectorAll(".dayCheck:checked").forEach(cb => {
                checkedDays.push(Number(cb.value));
            });
            if (checkedDays.length === 0) { alert("曜日を選択してください"); return; }

            let lastDate     = new Date(currentYear, currentMonth + 1, 0).getDate();
            let savePromises = [];
            for (let d = 1; d <= lastDate; d++) {
                let date    = new Date(currentYear, currentMonth, d);
                let weekDay = date.getDay();
                if (checkedDays.includes(weekDay)) {
                    let key =
                        currentYear + "-" +
                        String(currentMonth + 1).padStart(2, "0") + "-" +
                        String(d).padStart(2, "0");
                    if (!mealData[key]) {
                        mealData[key] = { morning: "unknown", lunch: "unknown", dinner: "unknown" };
                    }
                    mealData[key].morning = mealModalSelection.morning;
                    mealData[key].lunch   = mealModalSelection.lunch;
                    mealData[key].dinner  = mealModalSelection.dinner;
                    savePromises.push(saveMeal(key));
                }
            }
            await Promise.all(savePromises);
            closeMealModal();
            renderCalendar();
        }

        // ============================================================
        // ナビゲーション
        // ============================================================
        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }
        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        }
        function goToday() {
            const now    = new Date();
            currentYear  = now.getFullYear();
            currentMonth = now.getMonth();
            renderCalendar();
        }

        // ============================================================
        // UI表示切替
        // ============================================================
        function updateUI() {
            document.getElementById("monthNav").style.display  = "flex";
            document.getElementById("backNav").style.display   = "none";
            document.getElementById("calendar").style.display  = "table";
            document.getElementById("listView").style.display  = "none";
        }

    </script>

</body>
</html>
